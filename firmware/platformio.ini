; TerraRockio realtime controller — ESP32 + Dynamixel XL330
; Clean-room implementation. Proprietary (see /LICENSE).
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -std=gnu++17
lib_deps =
    ; Official Robotis library — talks Protocol 2.0 to XL330 over the TTL bus.
    robotis-git/Dynamixel2Arduino@^0.7.0
